# =============================================
# CONFIGURACIÓN: MySQL LOCAL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_belleza?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# ALMACENAMIENTO LOCAL DE IMÁGENES
# Las imágenes se guardan en: uploads/productos/
# =============================================
app.upload.dir=uploads/productos

# =============================================
# JWT
# =============================================
jwt.secret=EliteBeautySecretKey2024SuperLargoParaSeguridad
jwt.expiration=86400000

# =============================================
# SERVIDOR
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# CORS (permite peticiones desde React)
# =============================================
cors.allowed-origins=http://localhost:3000

# =============================================
# SERVIR IMÁGENES ESTÁTICAS DESDE /uploads/
# =============================================


# =============================================
# MULTIPART (subida de imágenes)
# =============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# LOGS
# =============================================
logging.level.com.organice=INFO
logging.level.org.springframework.security=WARN
